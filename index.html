<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등 1학년 크기 비교 게임</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Jua', sans-serif;
            background-color: #f8fbff;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            user-select: none;
            touch-action: manipulation;
        }

        /* 3D 라운드 버튼 공통 스타일 */
        .btn-3d {
            font-family: 'Jua', sans-serif;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            background: #ffcc00;
            box-shadow: 0 10px 0 #cca300;
            color: #444;
            outline: none;
            display: flex; justify-content: center; align-items: center;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        .active { display: flex; }

        #timer { font-size: 4rem; color: #ff4757; margin-bottom: 10px; }

        /* 막대 컨테이너 */
        .bar-container {
            width: 85%; height: 60px;
            background: #e0e0e0; border-radius: 40px;
            margin: 8px 0; display: flex; justify-content: center; align-items: center;
            position: relative; box-shadow: inset 0 4px 8px rgba(0,0,0,0.1);
        }
        .bar { height: 100%; border-radius: 40px; transition: width 0.1s linear; }
        #ref-bar { background: linear-gradient(to bottom, #ff6b6b, #ee5253); } 
        #player-bar { background: linear-gradient(to bottom, #54a0ff, #2e86de); }
        
        .label { font-size: 1.8rem; margin-top: 5px; color: #333; }

        /* 핵심: 반응형 컨트롤 레이아웃 */
        .mobile-controls {
            display: none; /* 기본적으로 PC에서는 숨김 */
            width: 90%;
            justify-content: space-between;
            margin-top: 30px;
            gap: 20px;
        }

        /* 모바일/태블릿 환경(너비 768px 이하)일 때만 버튼 노출 */
        @media screen and (max-width: 768px) {
            .mobile-controls {
                display: flex; 
            }
            .pc-tip {
                display: none; /* 모바일에서는 키보드 안내 숨김 */
            }
        }

        .control-btn {
            flex: 1;
            padding: 20px 0;
            font-size: 2rem;
            background: #54a0ff;
            box-shadow: 0 8px 0 #2e86de;
            color: white;
            border-radius: 20px;
        }

        /* 팝업 모달 */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 40px; text-align: center;
            max-width: 500px; width: 85%; border: 8px solid #ffcc00;
        }
        .teacher-img {
            width: 180px; height: 180px; border-radius: 50%;
            margin-bottom: 20px; object-fit: cover;
            border: 6px solid #ffcc00;
        }
        .msg { font-size: 1.8rem; margin-bottom: 25px; line-height: 1.5; color: #222; word-break: keep-all; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <button id="main-start-btn" class="btn-3d" style="padding: 30px 80px; font-size: 3rem;">게임 시작</button>
    </div>

    <div id="play-screen" class="screen">
        <div id="timer">10.0</div>
        
        <div class="bar-container"><div id="ref-bar" class="bar"></div></div>
        <div class="label">선생님 막대 (빨강)</div>
        
        <div style="height: 30px;"></div>

        <div class="bar-container"><div id="player-bar" class="bar"></div></div>
        <div class="label">나의 막대 (파랑)</div>

        <p class="pc-tip" style="font-size: 1.8rem; color: #7f8c8d; margin-top: 40px;">키보드 화살표 ←  → 를 눌러보세요!</p>

        <div class="mobile-controls">
            <button id="btn-left" class="btn-3d control-btn">작게 ←</button>
            <button id="btn-right" class="btn-3d control-btn">크게 →</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <img src="teacher.png" id="teacher-photo" class="teacher-img" onerror="this.style.display='none'">
            <div id="modal-msg" class="msg"></div>
            <button id="modal-confirm-btn" class="btn-3d" style="width:100%; padding: 20px 0; font-size: 2rem;">확인</button>
        </div>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const playScreen = document.getElementById('play-screen');
        const modal = document.getElementById('modal');
        const modalMsg = document.getElementById('modal-msg');
        const refBar = document.getElementById('ref-bar');
        const playerBar = document.getElementById('player-bar');
        const timerDisplay = document.getElementById('timer');

        const mainStartBtn = document.getElementById('main-start-btn');
        const modalConfirmBtn = document.getElementById('modal-confirm-btn');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');

        let refWidth = 50, playerWidth = 50, timeLeft, timerInterval;
        let isGameActive = false, mode = "";
        let changeInterval = null;

        // JS 기반 버튼 눌림 효과 처리
        function applyButtonEffect(btn, callback) {
            const shadowSize = btn.classList.contains('control-btn') ? 8 : 10;
            const press = (e) => {
                if(e && e.cancelable) e.preventDefault();
                btn.style.transform = `translateY(${shadowSize/2}px)`;
                btn.style.boxShadow = `0 ${shadowSize/2}px 0 #cca300`;
            };
            const release = (e) => {
                if(e && e.cancelable) e.preventDefault();
                btn.style.transform = 'translateY(0)';
                btn.style.boxShadow = `0 ${shadowSize}px 0 #cca300`;
            };

            btn.addEventListener('mousedown', press);
            btn.addEventListener('mouseup', () => { release(); if(callback) callback(); });
            btn.addEventListener('mouseleave', release);
            btn.addEventListener('touchstart', press);
            btn.addEventListener('touchend', (e) => { release(e); if(callback) callback(); });
        }

        // 모바일 버튼 연속 조작
        function setupContinuousControl(btn, delta) {
            const startChange = (e) => {
                if(!isGameActive) return;
                if(e.cancelable) e.preventDefault();
                if(changeInterval) clearInterval(changeInterval);
                changeInterval = setInterval(() => {
                    playerWidth = Math.min(100, Math.max(5, playerWidth + delta));
                    playerBar.style.width = playerWidth + "%";
                }, 50);
            };
            const stopChange = () => clearInterval(changeInterval);

            btn.addEventListener('mousedown', startChange);
            btn.addEventListener('touchstart', startChange);
            window.addEventListener('mouseup', stopChange);
            window.addEventListener('touchend', stopChange);
        }

        applyButtonEffect(mainStartBtn, showMission);
        applyButtonEffect(modalConfirmBtn, () => {
            if (modalConfirmBtn.innerText === "확인") startGame();
            else location.reload();
        });
        applyButtonEffect(btnLeft);
        applyButtonEffect(btnRight);
        setupContinuousControl(btnLeft, -2);
        setupContinuousControl(btnRight, 2);

        function showMission() {
            startScreen.classList.remove('active');
            refWidth = 50; playerWidth = 50;
            if (Math.random() > 0.5) {
                mode = "bigger";
                modalMsg.innerHTML = "안녕! 선생님 막대보다 내 막대를<br><b>더 크게</b> 만들어볼 수 있을까?";
            } else {
                mode = "smaller";
                modalMsg.innerHTML = "안녕! 선생님 막대보다 내 막대를<br><b>더 작게</b> 만들어볼 수 있을까?";
            }
            modalConfirmBtn.innerText = "확인";
            modal.style.display = 'flex';
        }

        function startGame() {
            modal.style.display = 'none';
            playScreen.classList.add('active');
            refBar.style.width = refWidth + "%";
            playerBar.style.width = playerWidth + "%";
            timeLeft = 10.0;
            isGameActive = true;
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) endGame(false);
                else {
                    timerDisplay.innerText = timeLeft.toFixed(1);
                    checkMission();
                }
            }, 100);
        }

        window.addEventListener('keydown', (e) => {
            if (!isGameActive) return;
            if (e.key === 'ArrowLeft') playerWidth = Math.max(5, playerWidth - 2);
            else if (e.key === 'ArrowRight') playerWidth = Math.min(100, playerWidth + 2);
            playerBar.style.width = playerWidth + "%";
        });

        function checkMission() {
            if (mode === "bigger" && playerWidth > refWidth) endGame(true);
            if (mode === "smaller" && playerWidth < refWidth) endGame(true);
        }

        function endGame(isSuccess) {
            isGameActive = false;
            clearInterval(timerInterval);
            if (isSuccess) {
                modalMsg.innerHTML = "<b>성공! 대단해요!</b><br>우리 친구 정말 최고다!<br>선생님이 아주아주 기뻐요! 👍";
            } else {
                // 선배님이 요청하신 따뜻한 위로 메세지
                modalMsg.innerHTML = "<b>괜찮아! 잘했어!</b><br>조금만 더 연습하면 금방 해낼 수 있어.<br>선생님은 우리 친구를 믿어! 😊";
            }
            modalConfirmBtn.innerText = "다시 하기";
            modal.style.display = 'flex';
        }
    </script>
</body>
</html>
