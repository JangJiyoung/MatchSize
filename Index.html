<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등 1학년 크기 비교 게임</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Jua', sans-serif;
            background-color: #f0f8ff;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 3D 사각 버튼 스타일 */
        .btn-3d {
            padding: 20px 40px;
            font-size: 2rem;
            cursor: pointer;
            border: none;
            border-radius: 20px;
            background: #ffcc00;
            box-shadow: 0 10px 0 #cca300;
            transition: all 0.1s;
            color: #444;
            outline: none;
        }
        .btn-3d:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #cca300;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        .active { display: flex; }

        /* 플레이 화면 요소 */
        #timer { font-size: 4rem; color: #ff4757; margin-bottom: 20px; }
        .bar-container {
            width: 80%; height: 70px;
            background: #fff; border-radius: 35px;
            margin: 15px 0; display: flex; justify-content: center; align-items: center;
            position: relative; box-shadow: inset 0 5px 10px rgba(0,0,0,0.1);
        }
        .bar { height: 100%; border-radius: 35px; transition: width 0.1s ease; width: 0%; }
        #ref-bar { background-color: #ff4757; } 
        #player-bar { background-color: #1e90ff; }
        
        /* 팝업 모달 */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 30px; text-align: center;
            max-width: 550px; width: 90%;
        }
        .teacher-img {
            width: 180px; height: 180px; border-radius: 50%;
            margin-bottom: 20px; object-fit: cover;
            border: 6px solid #ffcc00;
        }
        .msg { font-size: 1.8rem; margin-bottom: 30px; line-height: 1.5; color: #333; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <button class="btn-3d" onclick="showMission()">게임 시작하기</button>
    </div>

    <div id="play-screen" class="screen">
        <div id="timer">10.0</div>
        <div style="font-size: 1.5rem;">[기준 막대]</div>
        <div class="bar-container"><div id="ref-bar" class="bar"></div></div>
        <div style="height: 40px;"></div>
        <div style="font-size: 1.5rem;">[나의 막대]</div>
        <div class="bar-container"><div id="player-bar" class="bar"></div></div>
        <p style="font-size: 1.2rem; color: #666;">키보드 화살표 ←  → 를 눌러주세요!</p>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <img src="teacher.png" id="teacher-photo" class="teacher-img" onerror="this.src='https://via.placeholder.com/150?text=Teacher+Photo'">
            <div id="modal-msg" class="msg"></div>
            <button id="modal-btn" class="btn-3d" style="font-size: 1.5rem;">확인</button>
        </div>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const playScreen = document.getElementById('play-screen');
        const modal = document.getElementById('modal');
        const modalMsg = document.getElementById('modal-msg');
        const modalBtn = document.getElementById('modal-btn');
        const refBar = document.getElementById('ref-bar');
        const playerBar = document.getElementById('player-bar');
        const timerDisplay = document.getElementById('timer');

        let refWidth, playerWidth, timeLeft, timerInterval;
        let isGameActive = false;
        let mode = ""; 

        function showMission() {
            startScreen.classList.remove('active');
            
            // 기준 막대 설정 (40~70% 사이)
            refWidth = Math.floor(Math.random() * 30) + 40; 
            
            // 미션 결정
            if (Math.random() > 0.5) {
                mode = "bigger";
                playerWidth = refWidth - 20; // 기준보다 작게 시작 -> 더 크게 만들기
                modalMsg.innerHTML = "안녕! 아래 파란색 막대를<br>빨간색보다 <b>더 크게</b> 만들어볼까요?";
            } else {
                mode = "smaller";
                playerWidth = refWidth + 20; // 기준보다 크게 시작 -> 더 작게 만들기
                modalMsg.innerHTML = "안녕! 아래 파란색 막대를<br>빨간색보다 <b>더 작게</b> 만들어볼까요?";
            }

            modal.style.display = 'flex';
            modalBtn.innerText = "준비됐어요!";
            modalBtn.onclick = startGame;
        }

        function startGame() {
            modal.style.display = 'none';
            playScreen.classList.add('active');
            
            refBar.style.width = refWidth + "%";
            playerBar.style.width = playerWidth + "%";
            
            timeLeft = 10.0;
            isGameActive = true;

            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    endGame(false);
                } else {
                    timerDisplay.innerText = timeLeft.toFixed(1);
                    checkMission();
                }
            }, 100);
        }

        window.addEventListener('keydown', (e) => {
            if (!isGameActive) return;
            if (e.key === 'ArrowLeft') playerWidth = Math.max(5, playerWidth - 2);
            else if (e.key === 'ArrowRight') playerWidth = Math.min(100, playerWidth + 2);
            playerBar.style.width = playerWidth + "%";
        });

        function checkMission() {
            if (mode === "bigger" && playerWidth > refWidth) endGame(true);
            if (mode === "smaller" && playerWidth < refWidth) endGame(true);
        }

        function endGame(isSuccess) {
            isGameActive = false;
            clearInterval(timerInterval);
            timerDisplay.innerText = isSuccess ? "성공!" : "시간초과";

            if (isSuccess) {
                modalMsg.innerHTML = "<b>참 잘했어요!</b><br>정말 멋지게 미션을 해결했구나!<br>최고야! 👍";
            } else {
                modalMsg.innerHTML = "<b>아쉬워요!</b><br>조금만 더 하면 할 수 있을 거야.<br>다시 도전해볼까? 😊";
            }

            modal.style.display = 'flex';
            modalBtn.innerText = "다시 하기";
            modalBtn.onclick = () => location.reload();
        }
    </script>
</body>
</html>
